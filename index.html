<body>
    <div class="container">
        <h1>To encode what you want</h1>
        <h5>Open on a laptop for better readability</h5>
        <h3>Enter the text and the person's dob below</h3>
        <div>
            <label for="text-input">Enter text:</label>
            <input type="text" id="textInput" name="textInput" placeholder="Type the text...">
        </div>
        <div>
            <label for="dob">Enter DOB:</label>
            <input type="date" name="dob" id="dob">
        </div>
        <button class="submit">Get</button>
        <p class="encodedTextBox">Encoded Text</p>
    </div>
</body>

        //     }

        //     return result;

        function encode(text, key, salt) {
            key = key + salt;

            let shifts = key.repeat(Math.floor(text.length / key.length)) +
                        key.slice(0, text.length % key.length);

            let result = "";

            for (let i = 0; i < shifts.length; i++) {
                let shift = parseInt(shifts[i]) + 1;
                result += String.fromCharCode(text.charCodeAt(i) + shift);
            }

            return result;
        }
        document.querySelector('.encodedTextBox').textContent = encode(inputText, dob, "423272");

    });
</script>
