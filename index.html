<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Encoder</title>
</head>
<body>
    <div class="container">
        <h1>To encode what you want</h1>
        <h5>Open on a laptop for better readability</h5>
        <h3>Enter the text and the person's date of birth below</h3>
        <div>
            <textarea id="textInput" name="textInput" placeholder="Paste the text..."></textarea>
        </div>
        <div>
            <input type="date" name="dob" id="dob">
        </div>
        <button class="submit">Get</button>
        <p class="encodedTextBox">Encoded Text</p>
    </div>
</body>
<script>
    document.querySelector('.submit').addEventListener('click', function() {
        const inputText = document.getElementById('textInput').value;
        const dob = document.getElementById('dob').value.replace(/-/g, '');

        function encode(text, key, salt) {
            key = key + salt;

            let shifts = key.repeat(Math.floor(text.length / key.length)) +
                        key.slice(0, text.length % key.length);

            let result = "";

            for (let i = 0; i < shifts.length; i++) {
                let shift = parseInt(shifts[i]) + 1;
                result += String.fromCharCode(text.charCodeAt(i) + shift);
            }

            return result;
        }
        document.querySelector('.encodedTextBox').textContent = encode(inputText, dob, "423272");

    });
</script>
</html>
